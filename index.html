<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CollectiblesVault — Управление коллекцией</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root {
            --primary-dark: #1a2a4f;
            --secondary-teal: #4fd1c5;
            --accent-gold: #f5b042;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
            --danger: #ef4444;
            --success: #10b981;
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            --card-radius: 20px;
        }
        body { background: var(--bg-light); color: var(--text-dark); }
        .navbar {
            background: var(--primary-dark); color: white; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
            box-shadow: var(--shadow);
        }
        .logo {
            font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(135deg, var(--secondary-teal), var(--accent-gold));
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
        .nav-link {
            color: white; text-decoration: none; font-weight: 500; padding: 0.5rem 1rem;
            border-radius: 12px; transition: 0.2s; cursor: pointer;
        }
        .nav-link i { margin-right: 8px; }
        .nav-link.active, .nav-link:hover { background: rgba(79, 209, 197, 0.2); color: var(--secondary-teal); }
        .avatar {
            width: 40px; height: 40px; background: var(--secondary-teal); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--primary-dark);
            cursor: pointer;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem; margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--white); padding: 1.5rem; border-radius: var(--card-radius);
            box-shadow: var(--shadow); border: 1px solid var(--border); transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-title { color: var(--text-light); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary-dark); }
        .btn {
            padding: 0.6rem 1.2rem; border-radius: 12px; border: none; font-weight: 600;
            cursor: pointer; transition: 0.2s; background: var(--secondary-teal); color: var(--primary-dark);
        }
        .btn-primary { background: var(--secondary-teal); color: var(--primary-dark); }
        .btn-primary:hover { background: #3bb5a8; transform: scale(1.02); }
        .btn-accent { background: var(--accent-gold); color: var(--primary-dark); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        .items-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem; margin-top: 1.5rem;
        }
        .item-card {
            background: var(--white); border-radius: var(--card-radius); overflow: hidden;
            box-shadow: var(--shadow); border: 1px solid var(--border); transition: all 0.2s;
        }
        .item-card:hover { box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1); }
        .item-img {
            height: 160px; background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .item-img img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .item-img i {
            font-size: 3rem; color: var(--primary-dark);
        }
        .item-info { padding: 1rem; }
        .item-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.25rem; }
        .item-category { font-size: 0.8rem; color: var(--secondary-teal); font-weight: 600; margin-bottom: 0.5rem; }
        .item-price { font-weight: 700; color: var(--accent-gold); }
        .item-date { font-size: 0.75rem; color: var(--text-light); }
        .item-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--white); border-radius: 24px; padding: 2rem; width: 90%;
            max-width: 500px; max-height: 85vh; overflow-y: auto;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 12px;
        }
        .filters { display: flex; gap: 1rem; flex-wrap: wrap; margin: 1rem 0; align-items: center; }
        .filters select, .filters input { padding: 0.5rem; border-radius: 12px; border: 1px solid var(--border); }
        .report-table {
            width: 100%; border-collapse: collapse; margin-top: 1rem;
            background: var(--white); border-radius: 16px; overflow: hidden;
        }
        .report-table th, .report-table td { border: 1px solid var(--border); padding: 0.75rem; text-align: left; }
        .report-table th { background: var(--primary-dark); color: white; }
        .auth-container {
            max-width: 400px; margin: 4rem auto; background: var(--white);
            padding: 2rem; border-radius: 24px; box-shadow: var(--shadow);
        }
        .wishlist-card {
            background: var(--white); border-radius: var(--card-radius); padding: 1.5rem;
            margin-bottom: 1rem; box-shadow: var(--shadow); border: 1px solid var(--border);
        }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; text-align: center; }
            .stats-grid { grid-template-columns: 1fr; }
            .container { padding: 1rem; }
        }
        .hidden { display: none; }
        .priority-high { color: var(--danger); font-weight: bold; }
        .priority-medium { color: var(--accent-gold); }
        .priority-low { color: var(--secondary-teal); }
        .badge { padding: 2px 8px; border-radius: 20px; background: var(--bg-light); font-size: 0.7rem; }
        .text-secondary { color: var(--text-light); font-size: 0.8rem; }
        .toast-container {
            position: fixed; bottom: 20px; right: 20px; z-index: 2000;
        }
        .toast {
            background: var(--white); border-radius: 12px; padding: 12px 20px;
            margin-top: 10px; box-shadow: var(--shadow); border-left: 4px solid var(--secondary-teal);
            animation: slideIn 0.3s ease;
        }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="navbar" id="navbar">
    <div class="logo"><i class="fas fa-box"></i> CollectiblesVault</div>
    <div class="nav-links" id="nav-links"></div>
</div>

<div class="container" id="app"></div>
<div id="toast-container" class="toast-container"></div>

<div id="modal" class="modal">
    <div class="modal-content" id="modal-content-dynamic"></div>
</div>

<script>
(function() {
    'use strict';

    // ---------- РАЗРЕШЁННЫЕ ДОМЕНЫ EMAIL ----------
    const ALLOWED_EMAIL_DOMAINS = [
        'gmail.com', 'yandex.ru', 'mail.ru', 'bk.ru', 'list.ru', 'inbox.ru',
        'rambler.ru', 'yahoo.com', 'outlook.com', 'hotmail.com', 'icloud.com',
        'me.com', 'protonmail.com', 'tut.by', 'ukr.net', 'i.ua', 'meta.ua'
    ];

    function isValidEmailDomain(email) {
        if (!email || typeof email !== 'string') return false;
        const atIndex = email.indexOf('@');
        if (atIndex === -1) return false;
        const domain = email.substring(atIndex + 1).toLowerCase();
        return ALLOWED_EMAIL_DOMAINS.includes(domain);
    }

    // ---------- УТИЛИТЫ ----------
    function formatPrice(p) { 
        return (p || 0).toLocaleString('ru-RU') + ' ₽'; 
    }
    
    function formatDate(d) { 
        return d ? new Date(d).toLocaleDateString('ru-RU') : ''; 
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        if (!container) return;
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        const icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'exclamation-circle' : 'info-circle');
        toast.innerHTML = `<i class="fas fa-${icon}"></i> <span>${escapeHtml(message)}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'slideIn 0.3s ease reverse';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // ---------- СОСТОЯНИЕ ПРИЛОЖЕНИЯ ----------
    const AppState = {
        currentUser: null,
        users: [],
        collections: [],
        wishlist: [],
        nextId: { collection: 1, wish: 1 }
    };

    const STORAGE_KEY = 'collectibles_vault_state';

    function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                Object.assign(AppState, parsed);
                if (!AppState.nextId) AppState.nextId = { collection: 100, wish: 200 };
            } catch(e) { console.warn(e); }
        }
        if (!AppState.users.length) {
            AppState.users.push({ id: 1, email: 'demo@vault.ru', password: '123456', name: 'Демо Пользователь' });
        }
    }

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(AppState));
    }

    loadState();

    function getUserCollection() {
        if (!AppState.currentUser) return [];
        return AppState.collections.filter(c => c.userId === AppState.currentUser.id);
    }

    function getUserWishlist() {
        if (!AppState.currentUser) return [];
        return AppState.wishlist.filter(w => w.userId === AppState.currentUser.id);
    }

    // ---------- НАВИГАЦИЯ ----------
    let currentPage = 'dashboard';

    function navigateTo(page) {
        currentPage = page;
        render();
    }

    function logout() {
        AppState.currentUser = null;
        currentPage = 'login';
        render();
    }

    function highlightActiveNav() {
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.remove('active');
            if (link.dataset.page === currentPage) link.classList.add('active');
        });
    }

    // ---------- РЕНДЕР ----------
    function render() {
        var app = document.getElementById('app');
        var navLinks = document.getElementById('nav-links');
        var user = AppState.currentUser;

        if (!user) {
            navLinks.innerHTML = '<div class="nav-link" data-page="login"><i class="fas fa-sign-in-alt"></i> Вход</div>' +
                                '<div class="nav-link" data-page="register"><i class="fas fa-user-plus"></i> Регистрация</div>';
        } else {
            navLinks.innerHTML = '<div class="nav-link" data-page="dashboard"><i class="fas fa-chart-line"></i> Дашборд</div>' +
                                '<div class="nav-link" data-page="collection"><i class="fas fa-layer-group"></i> Коллекция</div>' +
                                '<div class="nav-link" data-page="wishlist"><i class="fas fa-heart"></i> Wishlist</div>' +
                                '<div class="nav-link" data-page="reports"><i class="fas fa-file-alt"></i> Отчёты</div>' +
                                '<div class="avatar" id="logout-avatar">' + user.email[0].toUpperCase() + '</div>' +
                                '<div class="nav-link" id="logout-text"><i class="fas fa-sign-out-alt"></i> Выход</div>';
            
            document.getElementById('logout-avatar')?.addEventListener('click', logout);
            document.getElementById('logout-text')?.addEventListener('click', logout);
        }

        document.querySelectorAll('[data-page]').forEach(el => {
            el.addEventListener('click', (e) => {
                const page = el.dataset.page;
                if (['login', 'register', 'dashboard', 'collection', 'wishlist', 'reports'].includes(page)) {
                    navigateTo(page);
                }
            });
        });

        if (!user) {
            if (currentPage === 'register') renderRegister(app);
            else renderLogin(app);
        } else {
            if (currentPage === 'collection') renderCollection(app);
            else if (currentPage === 'wishlist') renderWishlist(app);
            else if (currentPage === 'reports') renderReports(app);
            else renderDashboard(app);
        }
        
        highlightActiveNav();
        saveState();
    }

    // ---------- АВТОРИЗАЦИЯ ----------
    function renderLogin(container) {
        container.innerHTML = '<div class="auth-container">' +
            '<h2><i class="fas fa-sign-in-alt"></i> Вход</h2>' +
            '<form id="login-form">' +
                '<div class="form-group"><label>Email</label><input type="email" id="login-email" required></div>' +
                '<div class="form-group"><label>Пароль</label><input type="password" id="login-password" required></div>' +
                '<button type="submit" class="btn btn-primary">Войти</button>' +
                '<p style="margin-top:1rem;">Нет аккаунта? <a href="#" id="go-register">Зарегистрироваться</a></p>' +
            '</form>' +
        '</div>';
        
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('login-email').value;
            var pass = document.getElementById('login-password').value;
            var user = AppState.users.find(u => u.email === email && u.password === pass);
            if (user) {
                AppState.currentUser = { id: user.id, email: user.email, name: user.name };
                showToast('Добро пожаловать!', 'success');
                navigateTo('dashboard');
            } else {
                showToast('Неверный email или пароль', 'error');
            }
        });
        
        document.getElementById('go-register').addEventListener('click', function(e) {
            e.preventDefault(); 
            navigateTo('register');
        });
    }

    function renderRegister(container) {
        container.innerHTML = '<div class="auth-container">' +
            '<h2><i class="fas fa-user-plus"></i> Регистрация</h2>' +
            '<form id="register-form">' +
                '<div class="form-group"><label>Имя</label><input type="text" id="reg-name" required></div>' +
                '<div class="form-group"><label>Email</label><input type="email" id="reg-email" required></div>' +
                '<div class="form-group"><label>Пароль</label><input type="password" id="reg-password" required minlength="6"></div>' +
                '<small class="text-secondary">Допустимые домены: gmail.com, yandex.ru, mail.ru и др.</small>' +
                '<button type="submit" class="btn btn-primary" style="margin-top:1rem;">Зарегистрироваться</button>' +
                '<p style="margin-top:1rem;">Уже есть аккаунт? <a href="#" id="go-login">Войти</a></p>' +
            '</form>' +
        '</div>';
        
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var name = document.getElementById('reg-name').value;
            var email = document.getElementById('reg-email').value;
            var pass = document.getElementById('reg-password').value;

            if (!isValidEmailDomain(email)) {
                showToast('Используйте email с реальным доменом (например, @gmail.com, @yandex.ru)', 'error');
                return;
            }

            if (AppState.users.find(u => u.email === email)) {
                showToast('Пользователь с таким email уже существует', 'error');
                return;
            }

            var newUser = { id: Date.now(), email: email, password: pass, name: name };
            AppState.users.push(newUser);
            AppState.currentUser = { id: newUser.id, email: email, name: name };
            showToast('Регистрация успешна!', 'success');
            navigateTo('dashboard');
        });
        
        document.getElementById('go-login').addEventListener('click', function(e) {
            e.preventDefault(); 
            navigateTo('login');
        });
    }

    // ---------- ДАШБОРД ----------
    function renderDashboard(container) {
        var collection = getUserCollection();
        var wishlist = getUserWishlist().filter(w => !w.acquired);
        var totalValue = collection.reduce((sum, i) => sum + (i.price || 0), 0);
        var recent = collection.slice().sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,3);
        
        var html = '<div class="stats-grid">' +
            '<div class="stat-card"><div class="stat-title"><i class="fas fa-coins"></i> Общая стоимость</div><div class="stat-value">' + formatPrice(totalValue) + '</div></div>' +
            '<div class="stat-card"><div class="stat-title"><i class="fas fa-boxes"></i> Всего предметов</div><div class="stat-value">' + collection.length + '</div></div>' +
            '<div class="stat-card"><div class="stat-title"><i class="fas fa-heart"></i> В списке желаний</div><div class="stat-value">' + wishlist.length + '</div></div>' +
        '</div>' +
        '<h3><i class="fas fa-clock"></i> Последние добавленные</h3>' +
        '<div class="items-grid">';
        
        if (recent.length) {
            recent.forEach(function(item) {
                html += '<div class="item-card">' +
                    '<div class="item-img">' + 
                        (item.imageUrl ? `<img src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.name)}">` : '<i class="fas fa-box-open fa-3x"></i>') +
                    '</div>' +
                    '<div class="item-info">' +
                        '<div class="item-title">' + escapeHtml(item.name) + '</div>' +
                        '<div class="item-category">' + escapeHtml(item.category) + '</div>' +
                        '<div class="item-price">' + formatPrice(item.price) + '</div>' +
                        '<div class="item-date">' + formatDate(item.date) + '</div>' +
                    '</div>' +
                '</div>';
            });
        } else {
            html += '<p style="grid-column:1/-1;text-align:center;padding:2rem;">Нет предметов. Добавьте первый!</p>';
        }
        
        html += '</div>';
        container.innerHTML = html;
    }

    // ---------- КОЛЛЕКЦИЯ ----------
    function renderCollection(container) {
        container.innerHTML = '<div style="display:flex; justify-content:space-between; align-items:center;">' +
            '<h2><i class="fas fa-layer-group"></i> Моя коллекция</h2>' +
            '<button class="btn btn-primary" id="add-collection-btn"><i class="fas fa-plus"></i> Добавить</button>' +
        '</div>' +
        '<div class="filters">' +
            '<input type="text" id="search-col" placeholder="🔍 Поиск...">' +
            '<select id="cat-filter"><option value="">Все категории</option><option>Монеты</option><option>Марки</option><option>Фигурки</option><option>Картины</option><option>Другое</option></select>' +
            '<select id="sort-col"><option value="date">Сортировка: дата</option><option value="price">Сортировка: цена</option><option value="name">Сортировка: название</option></select>' +
        '</div>' +
        '<div class="items-grid" id="collection-grid"></div>';
        
        var grid = document.getElementById('collection-grid');
        
        function updateGrid() {
            var items = getUserCollection();
            var search = document.getElementById('search-col') ? document.getElementById('search-col').value.toLowerCase() : '';
            var cat = document.getElementById('cat-filter') ? document.getElementById('cat-filter').value : '';
            var sort = document.getElementById('sort-col') ? document.getElementById('sort-col').value : 'date';
            
            if (search) items = items.filter(i => i.name.toLowerCase().includes(search));
            if (cat) items = items.filter(i => i.category === cat);
            
            if (sort === 'price') items.sort((a,b) => (b.price||0) - (a.price||0));
            else if (sort === 'name') items.sort((a,b) => a.name.localeCompare(b.name));
            else items.sort((a,b) => new Date(b.date) - new Date(a.date));
            
            var html = '';
            if (items.length) {
                items.forEach(function(item) {
                    html += '<div class="item-card">' +
                        '<div class="item-img">' + 
                            (item.imageUrl ? `<img src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.name)}">` : '<i class="fas fa-image fa-3x"></i>') +
                        '</div>' +
                        '<div class="item-info">' +
                            '<div class="item-title">' + escapeHtml(item.name) + '</div>' +
                            '<div class="item-category">' + escapeHtml(item.category) + '</div>' +
                            '<div class="item-price">' + formatPrice(item.price) + '</div>' +
                            '<div class="item-date">' + formatDate(item.date) + '</div>' +
                            '<div class="item-actions">' +
                                '<button class="btn btn-sm edit-col" data-id="' + item.id + '"><i class="fas fa-edit"></i></button>' +
                                '<button class="btn btn-sm btn-danger delete-col" data-id="' + item.id + '"><i class="fas fa-trash"></i></button>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                });
            } else {
                html = '<p style="grid-column:1/-1;text-align:center;padding:2rem;">Нет предметов в коллекции</p>';
            }
            grid.innerHTML = html;
            
            document.querySelectorAll('.edit-col').forEach(btn => {
                btn.addEventListener('click', () => openCollectionModal(parseInt(btn.dataset.id)));
            });
            document.querySelectorAll('.delete-col').forEach(btn => {
                btn.addEventListener('click', () => {
                    if(confirm('Удалить предмет?')) {
                        AppState.collections = AppState.collections.filter(c => c.id !== parseInt(btn.dataset.id));
                        updateGrid(); 
                        saveState();
                        showToast('Предмет удалён', 'success');
                    }
                });
            });
        }
        
        document.getElementById('add-collection-btn').onclick = () => openCollectionModal(null);
        document.getElementById('search-col').addEventListener('input', updateGrid);
        document.getElementById('cat-filter').addEventListener('change', updateGrid);
        document.getElementById('sort-col').addEventListener('change', updateGrid);
        updateGrid();
    }

    function openCollectionModal(editId) {
        var item = editId ? AppState.collections.find(c => c.id === editId) : null;
        var modal = document.getElementById('modal');
        var content = document.getElementById('modal-content-dynamic');
        
        var categories = ['Монеты','Марки','Фигурки','Картины','Другое'];
        var catOptions = '';
        categories.forEach(c => {
            catOptions += `<option ${item && item.category === c ? 'selected' : ''}>${c}</option>`;
        });
        
        content.innerHTML = '<h2>' + (item ? 'Редактировать' : 'Добавить') + ' предмет</h2>' +
            '<form id="item-form">' +
                '<div class="form-group"><label>Название</label><input type="text" id="item-name" value="' + (item ? escapeHtml(item.name) : '') + '" required></div>' +
                '<div class="form-group"><label>Категория</label><select id="item-category">' + catOptions + '</select></div>' +
                '<div class="form-group"><label>Дата приобретения</label><input type="date" id="item-date" value="' + (item ? item.date : '') + '"></div>' +
                '<div class="form-group"><label>Стоимость (₽)</label><input type="number" id="item-price" step="0.01" value="' + (item ? item.price : '') + '"></div>' +
                '<div class="form-group"><label>URL изображения (необязательно)</label><input type="url" id="item-image" value="' + (item ? escapeHtml(item.imageUrl || '') : '') + '" placeholder="https://example.com/photo.jpg"></div>' +
                '<div class="form-group"><label>Описание</label><textarea id="item-desc" rows="3">' + (item ? escapeHtml(item.desc || '') : '') + '</textarea></div>' +
                '<div style="display:flex; gap:1rem;">' +
                    '<button type="submit" class="btn btn-primary">Сохранить</button>' +
                    '<button type="button" class="btn" id="close-modal">Отмена</button>' +
                '</div>' +
            '</form>';
        
        modal.classList.add('active');
        
        document.getElementById('item-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var data = {
                id: item ? item.id : AppState.nextId.collection++,
                userId: AppState.currentUser.id,
                name: document.getElementById('item-name').value,
                category: document.getElementById('item-category').value,
                date: document.getElementById('item-date').value,
                price: parseFloat(document.getElementById('item-price').value) || 0,
                desc: document.getElementById('item-desc').value,
                imageUrl: document.getElementById('item-image').value.trim() || null
            };
            
            if (item) {
                var idx = AppState.collections.findIndex(c => c.id === item.id);
                AppState.collections[idx] = data;
            } else {
                AppState.collections.push(data);
            }
            
            modal.classList.remove('active');
            saveState();
            render();
            showToast(item ? 'Изменения сохранены' : 'Предмет добавлен', 'success');
        });
        
        document.getElementById('close-modal').onclick = () => modal.classList.remove('active');
    }

    // ---------- WISHLIST ----------
    function renderWishlist(container) {
        container.innerHTML = '<div style="display:flex; justify-content:space-between; align-items:center;">' +
            '<h2><i class="fas fa-heart"></i> Список желаний</h2>' +
            '<button class="btn btn-primary" id="add-wish-btn"><i class="fas fa-plus"></i> Добавить</button>' +
        '</div>' +
        '<div id="wishlist-container"></div>';
        
        var wcont = document.getElementById('wishlist-container');
        
        function renderWishes() {
            var wishes = getUserWishlist().filter(w => !w.acquired);
            var html = '';
            if (wishes.length) {
                wishes.forEach(w => {
                    var priorityClass = w.priority === 'Высокий' ? 'priority-high' : (w.priority === 'Средний' ? 'priority-medium' : 'priority-low');
                    html += '<div class="wishlist-card">' +
                        '<div class="item-title">⭐ ' + escapeHtml(w.name) + '</div>' +
                        '<div class="item-category">' + escapeHtml(w.category) + '</div>' +
                        '<div style="margin:0.5rem 0;">💰 Желаемая цена: ' + formatPrice(w.desiredPrice) + '</div>' +
                        '<div class="' + priorityClass + '" style="margin-bottom:0.5rem;">🎯 Приоритет: ' + w.priority + '</div>' +
                        '<div class="item-actions">' +
                            '<button class="btn btn-sm btn-success mark-acquired" data-id="' + w.id + '">✅ Приобрёл</button>' +
                            '<button class="btn btn-sm edit-wish" data-id="' + w.id + '"><i class="fas fa-edit"></i></button>' +
                            '<button class="btn btn-sm btn-danger delete-wish" data-id="' + w.id + '"><i class="fas fa-trash"></i></button>' +
                        '</div>' +
                    '</div>';
                });
            } else {
                html = '<p style="text-align:center;padding:2rem;">Список желаний пуст</p>';
            }
            wcont.innerHTML = html;
            
            document.querySelectorAll('.mark-acquired').forEach(btn => {
                btn.addEventListener('click', function() {
                    var id = parseInt(btn.dataset.id);
                    var wish = AppState.wishlist.find(w => w.id === id);
                    if(wish) {
                        AppState.collections.push({ 
                            id: AppState.nextId.collection++, 
                            userId: AppState.currentUser.id, 
                            name: wish.name, 
                            category: wish.category, 
                            price: wish.desiredPrice, 
                            date: new Date().toISOString().split('T')[0], 
                            desc: 'Из wishlist',
                            imageUrl: null
                        });
                        wish.acquired = true;
                        saveState(); 
                        render();
                        showToast('Предмет перемещён в коллекцию!', 'success');
                    }
                });
            });
            document.querySelectorAll('.delete-wish').forEach(btn => {
                btn.addEventListener('click', function() {
                    if(confirm('Удалить из списка желаний?')) {
                        AppState.wishlist = AppState.wishlist.filter(w => w.id !== parseInt(btn.dataset.id));
                        saveState(); 
                        renderWishes();
                        showToast('Удалено из списка желаний', 'info');
                    }
                });
            });
            document.querySelectorAll('.edit-wish').forEach(btn => {
                btn.addEventListener('click', () => openWishModal(parseInt(btn.dataset.id)));
            });
        }
        
        document.getElementById('add-wish-btn').onclick = () => openWishModal(null);
        renderWishes();
    }

    function openWishModal(editId) {
        var wish = editId ? AppState.wishlist.find(w => w.id === editId) : null;
        var modal = document.getElementById('modal');
        var content = document.getElementById('modal-content-dynamic');
        
        var categories = ['Монеты','Марки','Фигурки','Картины','Другое'];
        var catOptions = '';
        categories.forEach(c => {
            catOptions += `<option ${wish && wish.category === c ? 'selected' : ''}>${c}</option>`;
        });
        var priorities = ['Высокий','Средний','Низкий'];
        var priorityOptions = '';
        priorities.forEach(p => {
            priorityOptions += `<option ${wish && wish.priority === p ? 'selected' : ''}>${p}</option>`;
        });
        
        content.innerHTML = '<h2>' + (wish ? 'Редактировать' : 'Добавить') + ' желание</h2>' +
            '<form id="wish-form">' +
                '<div class="form-group"><label>Название</label><input id="wish-name" value="' + (wish ? escapeHtml(wish.name) : '') + '" required></div>' +
                '<div class="form-group"><label>Категория</label><select id="wish-cat">' + catOptions + '</select></div>' +
                '<div class="form-group"><label>Желаемая цена</label><input type="number" id="wish-price" value="' + (wish ? wish.desiredPrice : '') + '"></div>' +
                '<div class="form-group"><label>Приоритет</label><select id="wish-priority">' + priorityOptions + '</select></div>' +
                '<div style="display:flex; gap:1rem;">' +
                    '<button type="submit" class="btn btn-primary">Сохранить</button>' +
                    '<button type="button" class="btn" id="close-modal">Отмена</button>' +
                '</div>' +
            '</form>';
        
        modal.classList.add('active');
        
        document.getElementById('wish-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var data = {
                id: wish ? wish.id : AppState.nextId.wish++,
                userId: AppState.currentUser.id,
                name: document.getElementById('wish-name').value,
                category: document.getElementById('wish-cat').value,
                desiredPrice: parseFloat(document.getElementById('wish-price').value) || 0,
                priority: document.getElementById('wish-priority').value,
                acquired: false
            };
            if (wish) {
                var idx = AppState.wishlist.findIndex(w => w.id === wish.id);
                AppState.wishlist[idx] = data;
            } else {
                AppState.wishlist.push(data);
            }
            modal.classList.remove('active'); 
            saveState(); 
            render();
            showToast(wish ? 'Изменения сохранены' : 'Добавлено в список желаний', 'success');
        });
        
        document.getElementById('close-modal').onclick = () => modal.classList.remove('active');
    }

    // ---------- ОТЧЁТЫ ----------
    function renderReports(container) {
        container.innerHTML = '<h2><i class="fas fa-chart-simple"></i> Генератор отчётов</h2>' +
            '<div class="filters">' +
                '<label><input type="radio" name="reportType" value="period" checked> По периоду</label>' +
                '<label><input type="radio" name="reportType" value="category"> По категории</label>' +
            '</div>' +
            '<div id="period-options" class="filters">' +
                '<select id="period-select"><option>День</option><option>Неделя</option><option>Месяц</option><option>Год</option></select>' +
                '<input type="date" id="report-date">' +
            '</div>' +
            '<div id="category-options" class="filters hidden">' +
                '<select id="report-category"><option>Монеты</option><option>Марки</option><option>Фигурки</option><option>Картины</option></select>' +
            '</div>' +
            '<div style="display:flex; gap:1rem; margin:1rem 0;">' +
                '<button class="btn btn-primary" id="generate-report"><i class="fas fa-chart-line"></i> Сформировать</button>' +
                '<button class="btn btn-accent" id="export-report"><i class="fas fa-download"></i> Экспорт CSV</button>' +
            '</div>' +
            '<div id="report-result"></div>';
        
        var typeRadios = document.querySelectorAll('input[name="reportType"]');
        var periodDiv = document.getElementById('period-options');
        var catDiv = document.getElementById('category-options');
        
        typeRadios.forEach(r => {
            r.addEventListener('change', function(e) {
                if(e.target.value === 'period') {
                    periodDiv.classList.remove('hidden');
                    catDiv.classList.add('hidden');
                } else {
                    periodDiv.classList.add('hidden');
                    catDiv.classList.remove('hidden');
                }
            });
        });
        
        document.getElementById('generate-report').onclick = function() {
            var type = document.querySelector('input[name="reportType"]:checked').value;
            var items = getUserCollection();
            if (type === 'category') {
                var cat = document.getElementById('report-category').value;
                items = items.filter(i => i.category === cat);
            }
            var total = items.reduce((sum, item) => sum + (item.price || 0), 0);
            var html = '';
            if (items.length) {
                html = '<table class="report-table">' +
                    '<tr><th>Название</th><th>Цена</th><th>Дата</th><th>Категория</th></tr>';
                items.forEach(i => {
                    html += `<tr><td>${escapeHtml(i.name)}</td><td>${formatPrice(i.price)}</td><td>${formatDate(i.date)}</td><td>${escapeHtml(i.category)}</td></tr>`;
                });
                html += `<tr><td colspan="3"><b>Итого:</b></td><td><b>${formatPrice(total)}</b></td></tr></table>`;
            } else {
                html = '<p>Нет данных для отображения</p>';
            }
            document.getElementById('report-result').innerHTML = html;
        };
        
        document.getElementById('export-report').onclick = function() {
            var csv = "Название,Цена,Дата,Категория\n";
            getUserCollection().forEach(i => {
                csv += `"${i.name}",${i.price},"${i.date}","${i.category}"\n`;
            });
            var blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8;'});
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob); 
            link.download = 'report.csv'; 
            link.click();
            showToast('Отчёт экспортирован', 'success');
        };
    }

    // Закрытие модального окна по клику вне его
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target.classList.contains('modal')) {
            e.target.classList.remove('active');
        }
    });

    // Запуск приложения
    render();
})();
</script>
</body>
</html>
